{{ define "main" }}
<section class="thoughts-page">
  <a class="back-link" href="{{ "/" | relURL }}">&#8592; Home</a>
  <h1 class="page-title">Thoughts</h1>
  {{ with .Content }}<div class="thoughts-intro">{{ . }}</div>{{ end }}
  <div class="thought-feed">
    {{ range .Pages.ByDate.Reverse }}
    <article class="thought">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ if .Title }}<h2 class="thought-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>{{ end }}
      <div class="thought-body">{{ .Content }}</div>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
