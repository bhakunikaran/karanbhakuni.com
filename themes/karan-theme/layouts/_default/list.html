{{ define "main" }}
<section class="essays list-page">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ range .Paginator.Pages.GroupByDate "2006" }}
  <div class="year-group">
    <div class="year">{{ .Key }}</div>
    <ul class="post-list">
      {{ range .Pages }}
      <li>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2" }}</time>
      </li>
      {{ end }}
    </ul>
  </div>
  {{ end }}
  <nav class="pager">
    {{ if .Paginator.HasPrev }}<a href="{{ .Paginator.Prev.URL }}">&larr; Newer</a>{{ end }}
    {{ if .Paginator.HasNext }}<a href="{{ .Paginator.Next.URL }}">Older &rarr;</a>{{ end }}
  </nav>
</section>
{{ end }}
