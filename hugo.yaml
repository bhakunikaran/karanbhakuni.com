baseURL: "https://www.karanbhakuni.com/"
languageCode: "en-us"
title: "Karan Bhakuni"
theme: "karan-theme"
enableRobotsTXT: true

# No tags/categories are used, so don't generate (or index) empty taxonomy pages.
disableKinds:
  - taxonomy
  - term

pagination:
  pagerSize: 20

# Serve posts at the root (/<slug>/) to preserve the URLs already indexed by
# search engines. The old Grigora site published essays at karanbhakuni.com/<slug>/
# with no section prefix, so we must match that exactly.
permalinks:
  posts: "/:slug/"

params:
  tagline: "Creating simplicity in a complex world"
  bio: "I build products and write. Most days there's a new essay here, each one an attempt to understand the quiet forces that shape a life: how focus is actually built, why self-respect tends to stay silent, and how the small choices no one sees end up deciding who you become."
  # Newsletter (Kit / ConvertKit). Paste your Kit form ID below to turn the
  # subscribe box on. Find it in Kit: Grow -> Landing Pages & Forms -> your form
  # -> the number in the URL (app.kit.com/forms/XXXXXXX). Leave empty to hide.
  newsletter:
    kitFormId: "9636496"
    heading: "Get new essays in your inbox"
    blurb: "A new essay most days on focus, self-respect, and living deliberately. No spam. Unsubscribe anytime."
    button: "Subscribe"
  podcast: "https://open.spotify.com/show/5m1dv63t7dbjo6YQcwDzSt"
  twitter: "https://x.com/karanbhakuni"
  linkedin: "https://www.linkedin.com/in/bhakunikaran"
  instagram: "https://www.instagram.com/karanlogs"
  reddit: "https://www.reddit.com/user/bhakunikaran/"
  profileImage: "/images/karan.jpg"
  projects:
    - name: "SmoothClip"
      url: "https://smoothclip.com/"
      desc: "Turn long videos into platform-ready clips"
      logo: "/images/logos/smoothclip.png"
    - name: "Flyn"
      url: "https://flyn.to/"
      desc: "Branded short links and click analytics"
      logo: "/images/logos/flyn.png"
    - name: "Poper"
      url: "https://www.poper.ai/"
      desc: "AI-powered smart popups and widgets for smart sites"
      logo: "/images/logos/poper.png"
    - name: "Grigora"
      url: "https://grigora.co/"
      desc: "Start a blog, build a website, a WordPress alternative"
      logo: "/images/logos/grigora.png"
    - name: "SaveSaas"
      url: "https://www.savesaas.com/"
      desc: "Find the best SaaS products"
      logo: "/images/logos/savesaas.png"
    - name: "Latracal"
      url: "https://www.latracal.com/"
      desc: "latracal.com"
      logo: "/images/logos/latracal.png"
    - name: "Stuff To Do Near Me"
      url: "https://www.stufftodonearme.com/"
      desc: "City guides, local activity ideas, and trip-planning tools"
      logo: "/images/logos/stufftodonearme.png"

menu:
  main:
    - name: "Home"
      url: "/"
      weight: 1
    - name: "Essays"
      url: "/posts/"
      weight: 2

markup:
  goldmark:
    renderer:
      unsafe: true
